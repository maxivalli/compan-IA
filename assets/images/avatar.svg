<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clip paths con la forma exacta del ojo: semicírculo arriba (r=54), esquinas redondeadas abajo (r=8) -->
    <clipPath id="le">
      <path d="M 130,90 A 54,54 0 0,1 184,144 L 184,208 A 8,8 0 0,1 176,216 L 84,216 A 8,8 0 0,1 76,208 L 76,144 A 54,54 0 0,1 130,90 Z"/>
    </clipPath>
    <clipPath id="re">
      <path d="M 270,90 A 54,54 0 0,1 324,144 L 324,208 A 8,8 0 0,1 316,216 L 224,216 A 8,8 0 0,1 216,208 L 216,144 A 54,54 0 0,1 270,90 Z"/>
    </clipPath>
    <!-- Sombra suave bajo los ojos -->
    <filter id="eyeShadow" x="-25%" y="-15%" width="150%" height="145%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#005566" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── Fondo ── -->
  <rect width="400" height="400" fill="#0097b2" rx="80"/>

  <!-- ══════════════════ OJO IZQUIERDO ══════════════════ -->

  <!-- Blanco del ojo -->
  <path d="M 130,90 A 54,54 0 0,1 184,144 L 184,208 A 8,8 0 0,1 176,216 L 84,216 A 8,8 0 0,1 76,208 L 76,144 A 54,54 0 0,1 130,90 Z"
        fill="#EDE8DF" filter="url(#eyeShadow)"/>

  <!-- Iris  (ø68, centrado en el ojo) -->
  <circle cx="130" cy="153" r="34" fill="#4B7FB5" clip-path="url(#le)"/>

  <!-- Pupila (ø34) -->
  <circle cx="130" cy="153" r="17" fill="#1A3A5C" clip-path="url(#le)"/>

  <!-- Reflejo principal (10×10, arriba-izquierda de la pupila) -->
  <circle cx="123" cy="146" r="5" fill="white" opacity="0.92" clip-path="url(#le)"/>
  <!-- Reflejo secundario (5×5, abajo-derecha) -->
  <circle cx="140" cy="163" r="2.5" fill="white" opacity="0.85" clip-path="url(#le)"/>

  <!-- Párpado superior: EYE_H * 0.06 ≈ 7.5 px, color del fondo -->
  <rect x="76" y="90" width="108" height="7.5" fill="#0097b2" clip-path="url(#le)"/>


  <!-- ══════════════════ OJO DERECHO ══════════════════ -->

  <!-- Blanco del ojo -->
  <path d="M 270,90 A 54,54 0 0,1 324,144 L 324,208 A 8,8 0 0,1 316,216 L 224,216 A 8,8 0 0,1 216,208 L 216,144 A 54,54 0 0,1 270,90 Z"
        fill="#EDE8DF" filter="url(#eyeShadow)"/>

  <!-- Iris -->
  <circle cx="270" cy="153" r="34" fill="#4B7FB5" clip-path="url(#re)"/>

  <!-- Pupila -->
  <circle cx="270" cy="153" r="17" fill="#1A3A5C" clip-path="url(#re)"/>

  <!-- Reflejos -->
  <circle cx="263" cy="146" r="5"   fill="white" opacity="0.92" clip-path="url(#re)"/>
  <circle cx="280" cy="163" r="2.5" fill="white" opacity="0.85" clip-path="url(#re)"/>

  <!-- Párpado superior -->
  <rect x="216" y="90" width="108" height="7.5" fill="#0097b2" clip-path="url(#re)"/>


  <!-- ══════════════════ BOCA (neutral / esperando) ══════════════════ -->
  <!--
    width=86, height=14, borderBottomRadius=42 → curva suave hacia abajo
    Sin relleno, solo borde: bottom 3px + lados 1.5px, color #B06050
  -->
  <path d="M 157,300 L 157,308 Q 200,318 243,308 L 243,300"
        fill="none"
        stroke="#B06050"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>
